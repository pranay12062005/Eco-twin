services:
  - type: web
    name: eco-twin-api
    env: node
    rootDir: eco-twin-api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    branch: main
    envVars:
      # Render will prompt you in the dashboard for these specific keys
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Automatically generate secure 64-character strings for JWT secrets
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
